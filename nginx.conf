# ============================================================
# Nginx vhost — 苏州赛冠官网
# 文件路径示例:
#   Debian/Ubuntu: /etc/nginx/sites-available/topchampion.conf
#   CentOS/宝塔  : /etc/nginx/conf.d/topchampion.conf
# 启用后:sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# 80 端口 → 强制跳转 HTTPS
server {
    listen 80;
    server_name www.topchampion.net topchampion.net;
    return 301 https://www.topchampion.net$request_uri;
}

# 443 端口 → 主站点
server {
    listen 443 ssl http2;
    server_name www.topchampion.net;

    # SSL — certbot 申请后会自动填充这两行
    ssl_certificate /etc/letsencrypt/live/www.topchampion.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.topchampion.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 安全头(SEO 加分项)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 文件上传上限(必须 ≥ 后端 .env 中的 MAX_UPLOAD_MB)
    client_max_body_size 30M;

    # 前端静态文件根目录(yarn build 产物)
    root /opt/topchampion/frontend;
    index index.html;

    # 静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SEO 文件不缓存
    location = /robots.txt   { try_files /robots.txt =404; }
    location = /sitemap.xml  { try_files /sitemap.xml =404; }

    # API 反代到 FastAPI(127.0.0.1 内网,不暴露 8001 端口)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;     # 文件上传流式
    }

    # SPA 路由 fallback(React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
